$kind: http-request
name: Register User
method: POST
url: '{{base_url}}/auth/register'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "full_name": "Jane Doe",
      "company": "Acme Corp",
      "email": "jane@example.com",
      "password": "Secret123!"
    }
